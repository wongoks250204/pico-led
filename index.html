<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pico W LED 제어</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2.5rem;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
      font-size: 0.9rem;
      color: #aaa;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.4s;
    }
    .dot.connected { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .dot.error      { background: #f87171; }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 1.5rem;
      padding: 2.5rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .led-indicator {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #2a2a3a;
      border: 3px solid #3a3a5a;
      transition: all 0.3s ease;
    }
    .led-indicator.on {
      background: #facc15;
      border-color: #fbbf24;
      box-shadow: 0 0 30px #facc15, 0 0 60px #facc1580;
    }

    .led-label {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .buttons {
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.75rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-on {
      background: #4ade80;
      color: #0a1a10;
    }
    .btn-on:hover:not(:disabled) {
      background: #22c55e;
      transform: translateY(-2px);
    }

    .btn-off {
      background: #f87171;
      color: #1a0505;
    }
    .btn-off:hover:not(:disabled) {
      background: #ef4444;
      transform: translateY(-2px);
    }

    .topic-info {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #555;
      text-align: center;
    }
    code {
      background: #111;
      padding: 0.15rem 0.4rem;
      border-radius: 0.3rem;
      font-family: monospace;
      color: #a78bfa;
    }
  </style>
</head>
<body>

  <h1>Pico W LED 제어</h1>
  <p class="subtitle">Raspberry Pi Pico W · MQTT over WebSocket</p>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">브로커에 연결 중...</span>
  </div>

  <div class="card">
    <div class="led-indicator" id="led-indicator"></div>
    <div class="led-label" id="led-label">LED OFF</div>

    <div class="buttons">
      <button class="btn-on"  id="btn-on"  onclick="sendCmd('ON')"  disabled>켜기</button>
      <button class="btn-off" id="btn-off" onclick="sendCmd('OFF')" disabled>끄기</button>
    </div>
  </div>

  <p class="topic-info">
    MQTT topic: <code id="topic-display"></code>
  </p>

  <script>
    // ── 설정 ────────────────────────────────────────────────────
    // ⚠️ TOPIC은 pico/main2.py의 MQTT_TOPIC과 반드시 일치해야 합니다.
    const TOPIC = 'pico-led/pico-led/21118';   // ← 고유한 값으로 변경하세요
    const BROKER_URL = 'wss://broker.hivemq.com:8884/mqtt';
    // ────────────────────────────────────────────────────────────

    document.getElementById('topic-display').textContent = TOPIC;

    const dot        = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const indicator  = document.getElementById('led-indicator');
    const ledLabel   = document.getElementById('led-label');
    const btnOn      = document.getElementById('btn-on');
    const btnOff     = document.getElementById('btn-off');

    const clientId = 'web-' + Math.random().toString(16).slice(2, 8);
    const client = mqtt.connect(BROKER_URL, { clientId });

    client.on('connect', () => {
      dot.className = 'dot connected';
      statusText.textContent = '브로커 연결됨';
      btnOn.disabled = false;
      btnOff.disabled = false;
    });

    client.on('error', () => {
      dot.className = 'dot error';
      statusText.textContent = '연결 오류';
    });

    client.on('close', () => {
      dot.className = 'dot';
      statusText.textContent = '연결 끊김 — 재연결 중...';
      btnOn.disabled = true;
      btnOff.disabled = true;
    });

    function sendCmd(cmd) {
      client.publish(TOPIC, cmd, { qos: 1 }, (err) => {
        if (!err) updateUI(cmd === 'ON');
      });
    }

    function updateUI(isOn) {
      if (isOn) {
        indicator.className = 'led-indicator on';
        ledLabel.textContent = 'LED ON';
      } else {
        indicator.className = 'led-indicator';
        ledLabel.textContent = 'LED OFF';
      }
    }
  </script>
</body>
</html>
